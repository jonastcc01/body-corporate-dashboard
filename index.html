<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Corporate Dashboard</title>
<style>
:root {
            --primary: #111111;
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text: #111111;
            --border: #d4d4d4;
            --muted: #737373;
            --hover: #e5e5e5;
        }
* { box-sizing:border-box; } body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; }
.container { max-width:1500px; margin:0 auto; } header { display:flex; gap:12px; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; }
h1 { margin:0; font-size:1.55rem; } .toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; width:100%; } .search-container { flex:1 1 280px; }
input[type="text"], textarea { width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; font-size:14px; font-family:inherit; } textarea { min-height:76px; resize:vertical; }
.stats { font-weight:700; color:var(--primary); white-space:nowrap; } .dashboard-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:16px; }
.card { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:14px; box-shadow:0 1px 3px rgba(0,0,0,.08); display:flex; flex-direction:column; }
.card-header { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:8px; }
.card-title { font-size:1.05rem; font-weight:800; margin:0; color:var(--primary); } .code-pill { font-size:.78rem; color:#334155; background:#e0f2fe; border:1px solid #bae6fd; border-radius:999px; padding:3px 8px; white-space:nowrap; }
.card-body { display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:.85rem; } .field { display:flex; flex-direction:column; gap:4px; }
.field label { font-weight:700; color:var(--muted); font-size:.75rem; display:flex; justify-content:space-between; gap:8px; align-items:center; }
.field input, .field textarea { border:1px solid transparent; background:#f1f5f9; padding:7px 8px; border-radius:7px; transition:border .2s, background .2s; }
.field input:focus, .field textarea:focus { outline:none; border:1px solid var(--primary); background:#fff; } .full-width { grid-column:span 2; }
.actions { margin-top:14px; display:flex; gap:8px; flex-wrap:wrap; } button, .file-label { cursor:pointer; padding:9px 12px; border-radius:8px; border:none; font-weight:700; transition:filter .2s, transform .05s; font-size:13px; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
button:active, .file-label:active { transform:translateY(1px); } button:hover, .file-label:hover { filter:brightness(.95); }
.btn-primary { background:var(--primary); color:white; } .btn-copy { background:var(--success); color:white; } .btn-reset,.btn-delete { background:var(--danger); color:white; } .btn-secondary,.file-label { background:#e2e8f0; color:#0f172a; } .btn-warning { background:var(--warning); color:#111827; } .btn-mini { padding:7px 8px; font-size:12px; min-width:40px; }
.hidden { display:none !important; } .toast { position:fixed; bottom:20px; right:20px; background:#111827; color:#fff; padding:11px 18px; border-radius:8px; display:none; z-index:1000; box-shadow:0 10px 20px rgba(0,0,0,.18); }
.modal-backdrop { position:fixed; inset:0; background:rgba(15,23,42,.55); display:none; align-items:center; justify-content:center; padding:16px; z-index:999; }
.modal { background:white; border-radius:14px; max-width:900px; width:100%; max-height:88vh; overflow:auto; padding:18px; box-shadow:0 20px 40px rgba(0,0,0,.25); }
.modal-header { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px; } .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:16px; } .help { color:var(--muted); font-size:.85rem; margin:0 0 12px; } input[type=file] { display:none; }
@media(max-width:760px) { body{padding:12px} .dashboard-grid{grid-template-columns:1fr} .card-body,.form-grid{grid-template-columns:1fr} .full-width{grid-column:span 1} }

.card {
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.card-title {
    letter-spacing: 0.4px;
}

.field input {
    background: #fafafa;
    border: 1px solid #e5e5e5;
    color: #111111;
}

.field input:focus {
    border: 1px solid #111111;
    background: #ffffff;
}

button {
    background: #111111 !important;
    color: white !important;
    border: 1px solid #111111 !important;
}

button:hover {
    background: #2b2b2b !important;
}

.btn-delete {
    background: #ffffff !important;
    color: #111111 !important;
    border: 1px solid #111111 !important;
}

.btn-delete:hover {
    background: #efefef !important;
}

header h1 {
    font-weight: 800;
    letter-spacing: -0.5px;
}

.toast {
    background: #111111;
    color: #ffffff;
}

</style>
</head>

const columns = ["CODE", "# of Lots", "CTS Number / Plan Number", "Body Corporate", "Street Address", "Suburb, State, Code", "Module", "Plan Type", "Plan Number", "Embedded Network", "Current Caretaking/Letting Agreement", "Building Manager", "BM Postal Address", "BM Email", "BM Phone", "Company Names"];
const storageKey = 'bc_dashboard_data_v2';
let dashboardData = [];
let editingIndex = null;
function clone(obj) { return JSON.parse(JSON.stringify(obj)); }
function escapeHtml(value) { return String(value ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
function init() { const stored = localStorage.getItem(storageKey) || localStorage.getItem('bc_dashboard_data'); try { dashboardData = stored ? JSON.parse(stored) : clone(originalData); } catch(e) { dashboardData = clone(originalData); } normalizeRows(); saveToStorage(); render(); }
function normalizeRows() { dashboardData = dashboardData.map(row => { const clean = {}; columns.forEach(c => clean[c] = row[c] ?? ''); return clean; }); }
function saveToStorage() { localStorage.setItem(storageKey, JSON.stringify(dashboardData)); }
function updateField(index, key, value) { dashboardData[index][key] = value; saveToStorage(); updateTitle(index); }
function updateTitle(index) { const card = document.getElementById('card-' + index); if (!card) return; card.querySelector('.card-title').textContent = dashboardData[index]['Body Corporate'] || 'Unnamed BC'; card.querySelector('.code-pill').textContent = dashboardData[index]['CODE'] || 'No Code'; }
async function copyText(text, message='Copied!') { try { await navigator.clipboard.writeText(text ?? ''); } catch(e) { const ta=document.createElement('textarea'); ta.value=text ?? ''; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); } showToast(message); }
function copyField(index, key) { copyText(dashboardData[index][key] || '', key + ' copied'); }
function copyRow(index) { const row = dashboardData[index]; copyText(columns.map(c => `${c}: ${row[c] || ''}`).join('\n'), 'Scheme copied'); }
function copyEmails(index) { const text = (dashboardData[index]['BM Email'] || '').match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/gi)?.join('; ') || dashboardData[index]['BM Email'] || ''; copyText(text, 'Email(s) copied'); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',1800); }
function resetData() { if(confirm('Reset all edits/imports back to the original embedded data?')) { dashboardData = clone(originalData); saveToStorage(); render(); } }
function deleteRecord(index) { if(confirm('Delete this scheme from your dashboard?')) { dashboardData.splice(index,1); saveToStorage(); render(); } }
function filterCards() { const query = document.getElementById('searchInput').value.toLowerCase().trim(); let visible=0; dashboardData.forEach((row,i)=>{ const card=document.getElementById('card-'+i); if(!card) return; const match=Object.values(row).join(' ').toLowerCase().includes(query); card.style.display=match?'flex':'none'; if(match) visible++; }); updateCount(visible); }
function updateCount(count) { document.getElementById('recordCount').textContent = `${count} of ${dashboardData.length} records`; }
function render() { const container=document.getElementById('dashboard'); container.innerHTML=''; dashboardData.forEach((row,index)=>{ const card=document.createElement('div'); card.className='card'; card.id='card-'+index; const header=document.createElement('div'); header.className='card-header'; header.innerHTML = `<h3 class="card-title">${escapeHtml(row['Body Corporate'] || 'Unnamed BC')}</h3><span class="code-pill">${escapeHtml(row['CODE'] || 'No Code')}</span>`; const body=document.createElement('div'); body.className='card-body'; columns.forEach(col=>{ const isFull = /address|corporate|email|manager|phone|company|agreement/i.test(col); const field=document.createElement('div'); field.className='field' + (isFull ? ' full-width' : ''); const label=document.createElement('label'); label.innerHTML = `<span>${escapeHtml(col)}</span><button class="btn-secondary btn-mini" type="button">Copy</button>`; const input = isFull ? document.createElement('textarea') : document.createElement('input'); if(!isFull) input.type='text'; input.value = row[col] || ''; input.addEventListener('input', e => updateField(index, col, e.target.value)); label.querySelector('button').addEventListener('click', () => copyField(index, col)); field.appendChild(label); field.appendChild(input); body.appendChild(field); }); const actions=document.createElement('div'); actions.className='actions'; actions.innerHTML = `<button class="btn-copy" onclick="copyRow(${index})">Copy All Data</button><button class="btn-secondary" onclick="copyEmails(${index})">Copy Email(s)</button><button class="btn-primary" onclick="openEditModal(${index})">Edit</button><button class="btn-delete" onclick="deleteRecord(${index})">Delete</button>`; card.appendChild(header); card.appendChild(body); card.appendChild(actions); container.appendChild(card); }); filterCards(); }
function openAddModal() { editingIndex=null; buildModal({}); document.getElementById('modalTitle').textContent='Add Scheme'; document.getElementById('modalBackdrop').style.display='flex'; }
function openEditModal(index) { editingIndex=index; buildModal(dashboardData[index]); document.getElementById('modalTitle').textContent='Edit Scheme'; document.getElementById('modalBackdrop').style.display='flex'; }
function buildModal(row) { const form=document.getElementById('modalForm'); form.innerHTML=''; columns.forEach(col=>{ const wrap=document.createElement('div'); wrap.className='field ' + (/address|corporate|email|manager|phone|company|agreement/i.test(col)?'full-width':''); const label=document.createElement('label'); label.textContent=col; const el=wrap.classList.contains('full-width')?document.createElement('textarea'):document.createElement('input'); if(el.tagName==='INPUT') el.type='text'; el.id='modal_'+col; el.value=row[col]||''; wrap.appendChild(label); wrap.appendChild(el); form.appendChild(wrap); }); }
function closeModal() { document.getElementById('modalBackdrop').style.display='none'; editingIndex=null; }
function closeModalFromBackdrop(e) { if(e.target.id==='modalBackdrop') closeModal(); }
function saveModalRecord() { const record={}; columns.forEach(col=> record[col] = document.getElementById('modal_'+col).value.trim()); const wasAdd = editingIndex===null; if(wasAdd) dashboardData.unshift(record); else dashboardData[editingIndex]=record; saveToStorage(); closeModal(); render(); showToast(wasAdd?'Scheme added':'Scheme saved'); }
function csvEscape(v) { v = String(v ?? ''); return /[",\n\r]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v; }
function toCSV(rows) { return [columns.map(csvEscape).join(','), ...rows.map(r => columns.map(c => csvEscape(r[c])).join(','))].join('\r\n'); }
function exportCSV() { const blob=new Blob([toCSV(dashboardData)],{type:'text/csv;charset=utf-8;'}); downloadBlob(blob, 'body-corporate-dashboard.csv'); }
function downloadBackup() { const blob=new Blob([JSON.stringify(dashboardData,null,2)],{type:'application/json'}); downloadBlob(blob, 'body-corporate-dashboard-backup.json'); }
function downloadBlob(blob, filename) { const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href); }
function parseCSV(text) { const rows=[]; let row=[], cell='', inQuotes=false; for(let i=0;i<text.length;i++){ const ch=text[i], next=text[i+1]; if(ch==='"'){ if(inQuotes && next==='"'){ cell+='"'; i++; } else inQuotes=!inQuotes; } else if(ch===',' && !inQuotes){ row.push(cell); cell=''; } else if((ch==='\n'||ch==='\r') && !inQuotes){ if(ch==='\r'&&next==='\n') i++; row.push(cell); if(row.some(v=>v!=='')) rows.push(row); row=[]; cell=''; } else cell+=ch; } row.push(cell); if(row.some(v=>v!=='')) rows.push(row); return rows; }
function importCSV(event) { const file=event.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=()=>{ const rows=parseCSV(reader.result); if(rows.length<2){ showToast('No CSV rows found'); return; } const headers=rows[0].map(h=>h.trim()); const missing=columns.filter(c=>!headers.includes(c)); if(missing.length && !confirm('CSV is missing these columns: '+missing.join(', ')+'\n\nImport anyway? Missing fields will be blank.')) return; const imported=rows.slice(1).map(r=>{ const obj={}; columns.forEach(c=>{ const idx=headers.indexOf(c); obj[c]=idx>=0 ? (r[idx] ?? '').trim() : ''; }); return obj; }); const mode=confirm(`Import ${imported.length} records.\n\nOK = Replace current dashboard\nCancel = Append to current dashboard`); dashboardData = mode ? imported : dashboardData.concat(imported); normalizeRows(); saveToStorage(); render(); showToast('CSV imported'); event.target.value=''; }; reader.readAsText(file); }
init();
</script>
